server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Serve the app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must always be fresh so it can update the cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Web app manifest
    location = /app.webmanifest {
        add_header Content-Type "application/manifest+json";
    }

    # Cache JS and CSS — exam JSON files intentionally excluded (short-lived data)
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Block access to sensitive files
    location ~ /\.(env|git|gitignore) {
        deny all;
        return 404;
    }
    location ~ /(scripts|node_modules)/ {
        deny all;
        return 404;
    }
}
